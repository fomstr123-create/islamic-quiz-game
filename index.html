    // --- SOUND ENGINE (Web Audio API Synthesizers) ---
    // Pure synthesized client sound with no network loading dependencies
    let audioCtx = null;
    let isAudioEnabled = true;

    function getAudioContext() {
      if (!isAudioEnabled) return null;
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          audioCtx = new AudioContextClass();
        }
      }
      if (audioCtx && audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      return audioCtx;
    }

    const soundEngine = {
      toggle(enabled) {
        isAudioEnabled = enabled;
        if (!enabled && audioCtx) {
          audioCtx.close().catch(() => {});
          audioCtx = null;
        }
      },
      playTick(isUrgent = false) {
        const ctx = getAudioContext();
        if (!ctx) return;
        try {
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.setValueAtTime(isUrgent ? 880 : 440, now);
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.04, now + 0.005);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.05);
        } catch (e) {
          console.warn(e);
        }
      },
      playCorrect() {
        const ctx = getAudioContext();
        if (!ctx) return;
        try {
          const now = ctx.currentTime;
          const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
          notes.forEach((freq, index) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(freq, now + index * 0.08);
            gain.gain.setValueAtTime(0, now + index * 0.08);
            gain.gain.linearRampToValueAtTime(0.12, now + index * 0.08 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.08 + 0.35);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + index * 0.08);
            osc.stop(now + index * 0.08 + 0.4);
          });
        } catch (e) {
          console.warn(e);
        }
      },
      playWrong() {
        const ctx = getAudioContext();
        if (!ctx) return;
        try {
          const now = ctx.currentTime;
          [0, 0.14].forEach((offset) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "triangle";
            osc.frequency.setValueAtTime(115, now + offset);
            osc.frequency.linearRampToValueAtTime(85, now + offset + 0.12);
            gain.gain.setValueAtTime(0, now + offset);
            gain.gain.linearRampToValueAtTime(0.18, now + offset + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.14);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + offset);
            osc.stop(now + offset + 0.15);
          });
        } catch (e) {
          console.warn(e);
        }
      },
      playVictory() {
        const ctx = getAudioContext();
        if (!ctx) return;
        try {
          const now = ctx.currentTime;
          const chords = [
            [261.63, 329.63, 392.00], // C4 major
            [349.23, 440.00, 523.25], // F4 major
            [392.00, 493.88, 587.33], // G4 major
            [523.25, 659.25, 783.99]  // C5 major climax
          ];
          chords.forEach((chord, chordIdx) => {
            const startTime = now + chordIdx * 0.22;
            const duration = chordIdx === 3 ? 0.8 : 0.2;
            chord.forEach((freq) => {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = chordIdx === 3 ? "sine" : "triangle";
              osc.frequency.setValueAtTime(freq, startTime);
              gain.gain.setValueAtTime(0, startTime);
              gain.gain.linearRampToValueAtTime(0.08, startTime + 0.03);
              gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start(startTime);
              osc.stop(startTime + duration + 0.05);
            });
          });
        } catch (e) {
          console.warn(e);
        }
      }

    // --- MAIN REACT STANDALONE COMPONENT (Unified Structure) ---
    function App() {
      // States
      const [selectedCategory, setSelectedCategory] = useState("جميع الأسئلة");
      const [isPlaying, setIsPlaying] = useState(false);
      const [isMuted, setIsMuted] = useState(false);
      const [autoAdvance, setAutoAdvance] = useState(true);
      const [gameMode, setGameMode] = useState("classic"); // classic, rapid, endless
      const [lives, setLives] = useState(3);
      const [streak, setStreak] = useState(0);
      const [encouragingMessage, setEncouragingMessage] = useState("");
      const [showDonationModal, setShowDonationModal] = useState(false);

      const [highestStreak, setHighestStreak] = useState(() => {
        try {
          const s = localStorage.getItem("stand_islamic_high_streak");
          return s ? parseInt(s, 10) : 0;
        } catch(e) { return 0; }
      });

      const [highScore, setHighScore] = useState(() => {
        try {
          const s = localStorage.getItem("stand_islamic_high_score");
          return s ? parseInt(s, 10) : 0;
        } catch(e) { return 0; }
      });

      // Internal Quiz state
      const [quizState, setQuizState] = useState({
        currentQuestionIndex: 0,
        score: 0,
        correctAnswersCount: 0,
        wrongAnswersCount: 0,
        selectedAnswerIndex: null,
        isTimeUp: false,
        isAnswered: false,
        timeLeft: 30,
        showExplanation: false,
        questions: [],
        lifelinesUsed: { split: false, skip: false },
        eliminatedOptions: [],
        history: []
      });

      const [advanceCountdown, setAdvanceCountdown] = useState(5);
      const [isComplete, setIsComplete] = useState(false);

      const timerRef = useRef(null);
      const autoAdvanceTimerRef = useRef(null);

      // Synced volume mutations
      useEffect(() => {
        soundEngine.toggle(!isMuted);
      }, [isMuted]);

      // Active playing timer logic
      useEffect(() => {
        if (!isPlaying || isComplete) return;
        if (quizState.isAnswered) {
          if (timerRef.current) clearInterval(timerRef.current);
          return;
        }

        timerRef.current = setInterval(() => {
          setQuizState((prev) => {
            if (prev.timeLeft <= 1) {
              clearInterval(timerRef.current);
              soundEngine.playWrong();
              setStreak(0);
              setEncouragingMessage("انتهى وقت الإجابة! لا بأس ميخالف كاعد تطور، ركز في القادم.");

              let updatedLives = lives;
              if (gameMode === "endless") {
                updatedLives = Math.max(0, lives - 1);
                setLives(updatedLives);
              }

              return {
                ...prev,
                timeLeft: 0,
                isTimeUp: true,
                isAnswered: true,
                showExplanation: true,
                wrongAnswersCount: prev.wrongAnswersCount + 1,
                history: [
                  ...prev.history,
                  {
                    questionId: prev.questions[prev.currentQuestionIndex].id,
                    userAnswerIndex: null,
                    isCorrect: false
                  }
                ]
              };
            }

            // warning triggers
            const threshold = gameMode === "rapid" ? 3 : 5;
            if (prev.timeLeft <= threshold) {
              soundEngine.playTick(true);
            } else if (prev.timeLeft % 5 === 0) {
              soundEngine.playTick(false);
            }

            return {
              ...prev,
              timeLeft: prev.timeLeft - 1
            };
          });
        }, 1000);

        return () => {
          if (timerRef.current) clearInterval(timerRef.current);
        };
      }, [isPlaying, isComplete, quizState.currentQuestionIndex, quizState.isAnswered, gameMode, lives]);

      // Auto-advance count limits
      useEffect(() => {
        if (!isPlaying || !quizState.isAnswered || !autoAdvance || isComplete) {
          if (autoAdvanceTimerRef.current) clearInterval(autoAdvanceTimerRef.current);
          return;
        }

        setAdvanceCountdown(5);

        autoAdvanceTimerRef.current = setInterval(() => {
          setAdvanceCountdown((prev) => {
            if (prev <= 1) {
              clearInterval(autoAdvanceTimerRef.current);
              handleNextQuestion();
              return 5;
            }
            return prev - 1;
          });
        }, 1000);

        return () => {
          if (autoAdvanceTimerRef.current) clearInterval(autoAdvanceTimerRef.current);
        };
      }, [isPlaying, isComplete, quizState.currentQuestionIndex, quizState.isAnswered, autoAdvance]);

      // Handle triggering next questions Pool
      const handleNextQuestion = () => {
        setEncouragingMessage("");
        if (timerRef.current) clearInterval(timerRef.current);
        if (autoAdvanceTimerRef.current) clearInterval(autoAdvanceTimerRef.current);

        // Endless mode loose validation
        if (gameMode === "endless" && lives <= 0) {
          endQuizSession();
          return;
        }

        const nextIndex = quizState.currentQuestionIndex + 1;

        // Infinite endless questions mapping
        if (gameMode === "endless" && nextIndex >= quizState.questions.length) {
          let pool = ALL_QUESTIONS;
          if (selectedCategory !== "جميع الأسئلة") {
            pool = ALL_QUESTIONS.filter(q => q.category === selectedCategory);
          }
          const reshuffled = [...pool].sort(() => Math.random() - 0.5);
          
          setQuizState(prev => ({
            ...prev,
            questions: [...prev.questions, ...reshuffled],
            currentQuestionIndex: nextIndex,
            selectedAnswerIndex: null,
            isTimeUp: false,
            isAnswered: false,
            timeLeft: 15,
            showExplanation: false,
            eliminatedOptions: []
          }));
          return;
        }

        if (nextIndex >= quizState.questions.length) {
          endQuizSession();
        } else {
          const limit = gameMode === "rapid" ? 8 : gameMode === "endless" ? 15 : 30;
          setQuizState(prev => ({
            ...prev,
            currentQuestionIndex: nextIndex,
            selectedAnswerIndex: null,
            isTimeUp: false,
            isAnswered: false,
            timeLeft: limit,
            showExplanation: false,
            eliminatedOptions: []
          }));
        }
      };

      const endQuizSession = () => {
        setIsComplete(true);
        soundEngine.playVictory();
        if (quizState.score > highScore) {
          setHighScore(quizState.score);
          try {
            localStorage.setItem("stand_islamic_high_score", quizState.score.toString());
          } catch(e){}
        }
      };

      // Start core rounds
      const handleStartQuiz = () => {
        setEncouragingMessage("");
        let pool = ALL_QUESTIONS;
        if (selectedCategory !== "جميع الأسئلة") {
          pool = ALL_QUESTIONS.filter(q => q.category === selectedCategory);
        }

        const modeTime = gameMode === "rapid" ? 8 : gameMode === "endless" ? 15 : 30;
        setLives(3);
        setStreak(0);

        const shuffled = [...pool].sort(() => Math.random() - 0.5);
        const targetQuestions = gameMode === "endless" ? shuffled : shuffled.slice(0, 10);

        setQuizState({
          currentQuestionIndex: 0,
          score: 0,
          correctAnswersCount: 0,
          wrongAnswersCount: 0,
          selectedAnswerIndex: null,
          isTimeUp: false,
          isAnswered: false,
          timeLeft: modeTime,
          showExplanation: false,
          questions: targetQuestions,
          lifelinesUsed: { split: false, skip: false },
          eliminatedOptions: [],
          history: []
        });

        setIsPlaying(true);
        setIsComplete(false);
        setAdvanceCountdown(5);
      };

      // Lifelines triggers
      const handleSkipQuestion = () => {
        if (quizState.isAnswered || quizState.lifelinesUsed.skip) return;
        if (timerRef.current) clearInterval(timerRef.current);

        setQuizState(prev => {
          const q = prev.questions[prev.currentQuestionIndex];
          return {
            ...prev,
            isAnswered: true,
            showExplanation: true,
            selectedAnswerIndex: null,
            lifelinesUsed: { ...prev.lifelinesUsed, skip: true },
            history: [
              ...prev.history,
              { questionId: q.id, userAnswerIndex: null, isCorrect: false }
            ]
          };
        });
        soundEngine.playTick(false);
      };

      const handleSplitChoices = () => {
        if (quizState.isAnswered || quizState.lifelinesUsed.split) return;
        const currentQ = quizState.questions[quizState.currentQuestionIndex];
        const correct = currentQ.correctAnswerIndex;
        
        const wrongIndices = currentQ.options
          .map((_, i) => i)
          .filter(i => i !== correct);

        const toEliminate = wrongIndices.sort(() => Math.random() - 0.5).slice(0, 2);

        setQuizState(prev => ({
          ...prev,
          eliminatedOptions: toEliminate,
          lifelinesUsed: { ...prev.lifelinesUsed, split: true }
        }));
        soundEngine.playTick(false);
      };

      // Answer click callback
      const handleSelectAnswer = (optionIdx) => {
        if (quizState.isAnswered) return;
        if (timerRef.current) clearInterval(timerRef.current);

        const currentQ = quizState.questions[quizState.currentQuestionIndex];
        const isCorrect = optionIdx === currentQ.correctAnswerIndex;

        if (isCorrect) {
          soundEngine.playCorrect();
          const nextStreak = streak + 1;
          setStreak(nextStreak);
          if (nextStreak > highestStreak) {
            setHighestStreak(nextStreak);
            try {
              localStorage.setItem("stand_islamic_high_streak", nextStreak.toString());
            } catch(e){}
          }

          const correctPhrases = [
            "أحسنت بارك الله فيك! جواب متقن رائع.",
            "كفو والله! ممتاز، إجابتك صحيحة.",
            "سبع! إجابة موفقة رعاك الله وسددك.",
            "ما شاء الله، إجابة في الصميم وعلم غزير!",
            "عاشت إيدك! صحيح 100% وبدون تردد.",
            "أصبت الهدف! تفوق ديني مبارك."
          ];
          setEncouragingMessage(correctPhrases[Math.floor(Math.random() * correctPhrases.length)]);
        } else {
          soundEngine.playWrong();
          setStreak(0);
          if (gameMode === "endless") {
            setLives(l => Math.max(0, l - 1));
          }

          const wrongPhrases = [
            "لا بأس ميخالف كاعد تطور، كمل!",
            "معوض بالباقي إن شاء الله، ركز شوي ولتستسلم.",
            "خطأ بسيط تتعلم منه، كاعد تطور أداءك باستمرار.",
            "خيرها بغيرها سبع! كاعد تكتسب معلومات ومعرفة تبارك الله.",
            "لا بأس، كلنا نخطأ، المهم الاستفادة وتطوير المهارات.",
            "ميخالف.. خطوة بخطوة تزداد براعة وفهماً، استمر!"
          ];
          setEncouragingMessage(wrongPhrases[Math.floor(Math.random() * wrongPhrases.length)]);
        }

        setQuizState((prev) => {
          let scoreAdded = 0;
          if (isCorrect) {
            const basePoints = gameMode === "rapid" ? 150 : 100;
            const multiplier = gameMode === "rapid" ? 10 : gameMode === "endless" ? 5 : 3;
            const streakBonus = gameMode === "endless" ? (streak + 1) * 15 : 0;
            scoreAdded = basePoints + (prev.timeLeft * multiplier) + streakBonus;
          }

          return {
            ...prev,
            selectedAnswerIndex: optionIdx,
            isAnswered: true,
            showExplanation: true,
            score: prev.score + scoreAdded,
            correctAnswersCount: isCorrect ? prev.correctAnswersCount + 1 : prev.correctAnswersCount,
            wrongAnswersCount: !isCorrect ? prev.wrongAnswersCount + 1 : prev.wrongAnswersCount,
            history: [
              ...prev.history,
              {
                questionId: currentQ.id,
                userAnswerIndex: optionIdx,
                isCorrect
              }
            ]
          };
        });
      };

      const handleQuitQuiz = () => {
        if (confirm("هل أنت متأكد من رغبتك في إنهاء جولة المسابقة الدينية الحالية؟")) {
          setIsPlaying(false);
          setIsComplete(false);
        }

      };

      const currentQuestion = isPlaying && quizState.questions.length > 0 ? quizState.questions[quizState.currentQuestionIndex] : null;

                  <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />

                      <span>💖</span>
                    </button>
                  </div>

                </div>
              </div>
            )}

            {/* VIEW 2: ACTIVE PLAYING */}
            {isPlaying && !isComplete && currentQuestion && (
              <div id="active-panel" className="w-full max-w-2xl bg-slate-950/40 glass-panel rounded-3xl p-5 md:p-6 text-center space-y-4">
                
                {/* Score and header status indicators */}
                <div className="flex flex-wrap items-center justify-between gap-2.5 border-b border-light border-white/5 pb-3">
                  <div className="flex items-center gap-1.5 flex-wrap">
                    <span className="text-[11px] text-gray-400 font-bold">السؤال الحالي:</span>
                    <span className="px-2.5 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-black">
                      {gameMode === "endless" ? `عدد ${quizState.currentQuestionIndex + 1}` : `${quizState.currentQuestionIndex + 1} / 10`}
                    </span>
                    <span className="px-2 py-0.5 rounded bg-yellow-500/10 border border-yellow-500/20 text-yellow-400 text-[10px] font-bold">
                      {currentQuestion.category}
                    </span>

                    {gameMode === "endless" && (
                      <div className="flex items-center gap-1 bg-yellow-500/10 px-2.5 py-1 rounded border border-yellow-500/25">
                        <span className="text-[10px] text-yellow-300 font-bold">الفرص:</span>
                        <div className="flex gap-0.5">
                          {Array.from({ length: 3 }).map((_, i) => (
                            <span key={i} className={`text-xs ${i < lives ? "opacity-100" : "opacity-25 grayscale"}`}>💛</span>
                          ))}
                        </div>
                      </div>
                    )}

                    {gameMode === "endless" && streak > 0 && (
                      <div className="animate-pulse bg-orange-500/20 text-orange-400 px-2 py-0.5 rounded text-[10px] font-extrabold border border-orange-500/20">
                        🔥 {streak} متتالي!
                      </div>
                    )}
                  </div>

                  <div className="flex items-center gap-3">
                    <div className="text-right">
                      <p className="text-[9px] text-gray-400 uppercase leading-none">النقاط الكلية</p>
                      <p className="text-sm font-black text-white font-mono mt-0.5">{quizState.score}</p>
                    </div>
                    <button
                      onClick={handleQuitQuiz}
                      className="px-2 py-0.5 rounded border border-red-500/20 text-red-400 text-[10px] font-bold hover:bg-red-500/15"
                    >
                      إنهاء
                    </button>
                  </div>
                </div>

                {/* Progress bar */}
                <div className="w-full bg-white/5 h-1 md:h-1.5 rounded-full overflow-hidden">
                  <div 
                    className="bg-gradient-to-r from-yellow-500 via-orange-500 to-emerald-500 h-full rounded-full transition-all duration-300"
                    style={{
                      width: gameMode === "endless" 
                        ? `${Math.min(100, (streak / 10) * 100)}%` 
                        : `${(quizState.currentQuestionIndex / 10) * 100}%`
                    }}
                  ></div>
                </div>

                {/* TIMER STATE VISUALIZATION */}
                <div className="flex items-center justify-center gap-3">
                  <div className="relative w-12 h-12 flex items-center justify-center">
                    <svg className="w-12 h-12 transform -rotate-90">
                      <circle cx="24" cy="24" r="20" stroke="rgba(255,255,255,0.05)" strokeWidth="3" fill="none" />
                      <circle 
                        cx="24" 
                        cy="24" 
                        r="20" 
                        stroke={quizState.timeLeft <= 3 ? "#ef4444" : quizState.timeLeft <= 8 ? "#f59e0b" : "#10b981"} 
                        strokeWidth="3" 
                        strokeDasharray={2 * Math.PI * 20} 
                        strokeDashoffset={(2 * Math.PI * 20) * (1 - quizState.timeLeft / (gameMode === "rapid" ? 8 : gameMode === "endless" ? 15 : 30))}
                        fill="none" 
                        className="transition-all duration-1000 ease-linear"
                      />
                    </svg>
                    <span className={`absolute font-mono font-black text-xs ${quizState.timeLeft <= 3 ? "text-red-500 animate-pulse font-extrabold text-sm" : "text-emerald-400"}`}>
                      {quizState.timeLeft}ث
                    </span>
                  </div>
                  <div className="text-right text-[10px] text-gray-400 font-semibold leading-relaxed">
                    <span>مؤقت الاستجابة الديني السريع: سيتم إبراز الإجابة والمتابعة تلقائياً في ثوانٍ.</span>
                  </div>
                </div>

                {/* QUESTION WRAPPER */}
                <div className="p-5 md:p-6 rounded-2xl bg-white/5 border border-white/5 text-center relative overflow-hidden">
                  <h3 className="text-base md:text-lg font-bold text-white leading-relaxed relative z-10 select-text">
                    {currentQuestion.text}
                  </h3>
                </div>

                {/* HELP LIFELINES (CLASSIC / ENDLESS MODE ONLY) */}
                <div className="flex flex-wrap items-center justify-between text-xs font-semibold bg-white/5 p-2 rounded-xl">
                  <span className="text-yellow-400 font-bold">وسائل المساعدة المتاحة:</span>
                  {gameMode === "rapid" ? (
                    <span className="text-red-400 font-medium text-[10px] animate-pulse">لا تتوفر وسائل مساعدة في تحدي السرعة !</span>
                  ) : (
                    <div className="flex gap-2">
                      <button
                        disabled={quizState.isAnswered || quizState.lifelinesUsed.split}
                        onClick={handleSplitChoices}
                        className={`px-2 py-1 rounded text-[10px] font-bold border transition-all ${
                          quizState.lifelinesUsed.split 
                            ? "border-transparent text-gray-500 bg-gray-500/10 cursor-not-allowed" 
                            : "border-amber-500/20 text-amber-300 bg-amber-500/10 hover:bg-amber-500/20"
                        }`}
                      >
                        حذف إجابتين (50/50)
                      </button>

                      <button
                        disabled={quizState.isAnswered || quizState.lifelinesUsed.skip}
                        onClick={handleSkipQuestion}
                        className={`px-2 py-1 rounded text-[10px] font-bold border transition-all ${
                          quizState.lifelinesUsed.skip 
                            ? "border-transparent text-gray-500 bg-gray-500/10 cursor-not-allowed" 
                            : "border-blue-500/20 text-blue-300 bg-blue-500/10 hover:bg-blue-500/20"
                        }`}
                      >
                        تخطي هذا السؤال بدون جزاء
                      </button>
                    </div>
                  )}
                </div>

                {/* CHOICES OPTIONS LIST */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-right pt-2">
                  {currentQuestion.options.map((option, idx) => {
                    const isCorrect = idx === currentQuestion.correctAnswerIndex;
                    const isUserPick = idx === quizState.selectedAnswerIndex;
                    const isEliminated = quizState.eliminatedOptions.includes(idx);

                    let styles = "bg-white/5 border-white/5 text-gray-300 hover:bg-white/10 hover:border-yellow-500/20";
                    let icon = null;

                    if (isEliminated) {
                      styles = "bg-slate-900/30 border-slate-900/40 text-gray-600 opacity-20 pointer-events-none cursor-not-allowed";
                    } else if (quizState.isAnswered) {
                      if (isCorrect) {
                        styles = "bg-green-500/20 border-green-500 text-green-300 font-extrabold";
                        icon = <span className="p-0.5 rounded-full bg-green-500/20 text-green-400 font-bold">✓</span>;
                      } else if (isUserPick) {
                        styles = "bg-red-500/20 border-red-500 text-red-300 font-extrabold";
                        icon = <span className="p-0.5 rounded-full bg-red-500/20 text-red-400 font-bold">✗</span>;
                      } else {
                        styles = "bg-transparent border-white/5 text-gray-500 opacity-30 cursor-not-allowed";
                      }
                    }

                    return (
                      <button
                        key={`${quizState.currentQuestionIndex}-${idx}`}
                        disabled={quizState.isAnswered || isEliminated}
                        onClick={() => handleSelectAnswer(idx)}
                        className={`p-3.5 rounded-xl border transition-all text-xs md:text-sm font-semibold flex items-center justify-between animate-option ${styles}`}
                        style={{ animationDelay: `${idx * 80}ms` }}
                      >
                        <span>{option}</span>
                        {icon && <span className="text-sm">{icon}</span>}
                      </button>
                    );
                  })}
                </div>

                {/* EDUCATIONAL DETAILED TRIVIA FEEDBACK PANEL */}
                {quizState.showExplanation && (
                  <div className="rounded-2xl border border-yellow-500/15 bg-slate-950/70 p-4 text-right space-y-3">
                    {encouragingMessage && (
                      <div className="bg-yellow-400/10 border-r-4 border-yellow-400 p-2.5 text-right rounded-l mb-1 animate-[pulse_2s_infinite]">
                        <span className="text-yellow-400 text-xs font-black font-sans">⭐ {encouragingMessage}</span>
                      </div>
                    )}
                    <div className="flex items-center justify-between border-b border-white/5 pb-2">
                      <div className="text-xs font-black">
                        {quizState.isTimeUp ? (
                          <span className="text-yellow-400 bg-yellow-400/10 px-2 py-0.5 rounded">انقضى الوقت بالكامل!</span>
                        ) : quizState.selectedAnswerIndex === currentQuestion.correctAnswerIndex ? (
                          <span className="text-green-400 bg-green-400/10 px-2 py-0.5 rounded">إجابتك صحيحة وموفقة تبارك الله!</span>
                        ) : quizState.selectedAnswerIndex === null ? (
                          <span className="text-blue-400 bg-blue-400/10 px-2 py-0.5 rounded">تم استخدام تخطي السؤال لبر الأمان</span>
                        ) : (
                          <span className="text-red-400 bg-red-400/10 px-2 py-0.5 rounded">إجابة غير صحيحة، ركز في القادم!</span>
                        )}
                      </div>

                      <button
                        onClick={handleNextQuestion}
                        className="px-4 py-1.5 bg-gradient-to-r from-yellow-400 to-amber-500 text-slate-950 font-black rounded-lg text-xs flex items-center gap-1 active:scale-95 transition-all shadow-md"
                      >
                        <span>السؤال التالي {autoAdvance && `(${advanceCountdown}ث)`}</span>
                        <span>←</span>
                      </button>
                    </div>

                    <div className="text-xs leading-relaxed text-gray-300">
                      <span className="text-yellow-400 font-black block mb-0.5 font-sans">🎓 هل تعلم؟ (فائدة دينية قيمة):</span>
                      <p className="font-sans leading-relaxed text-slate-100">{currentQuestion.explanation}</p>
                    </div>

                    <div className="pt-2 flex items-center justify-between text-[11px] text-gray-400">
                      <span>التحكم التفاعلي المستمر بالتنقل:</span>
                      <button
                        onClick={() => { setAutoAdvance(!autoAdvance); soundEngine.playTick(false); }}
                        className="text-[10px] text-yellow-400 font-semibold flex items-center gap-1 hover:underline"
                      >
                        <span className={`w-3.5 h-3.5 border rounded flex items-center justify-center ${autoAdvance ? "border-yellow-500 bg-yellow-500/10" : "border-gray-500"}`}>
                          {autoAdvance && "✓"}
                        </span>
                        <span>الانتقال التلقائي للأسئلة</span>
                      </button>
                    </div>
                  </div>
                )}

              </div>
            )}

            {/* VIEW 3: ROUND OVER SCORE REPORT */}
            {isComplete && (
              <div id="result-panel" className="w-full max-w-2xl px-5 py-7 glass-panel rounded-3xl relative overflow-hidden shadow-2xl text-center space-y-5">
                <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-yellow-600 via-yellow-400 to-yellow-600" />
                
                <div className="relative inline-block">
                  <div className="absolute -inset-1.5 bg-yellow-500/25 rounded-full blur-xl opacity-75 animate-bounce" />
                  <div className="relative bg-emerald-950/80 p-4 rounded-full border border-yellow-500/30 flex items-center justify-center w-16 h-16 mx-auto text-yellow-500 text-3xl font-bold">
                    🏆
                  </div>
                </div>

                <div>
                  <span className="text-[10px] tracking-widest text-yellow-400 font-extrabold uppercase bg-yellow-500/10 px-2.5 py-1 rounded-full">
                    {gameMode === "endless" ? "انتهت جولة بقاء رصيد القلوب اللانهائي!" : "اكتملت المسابقة الدينية بنجاح!"}
                  </span>
                  <h2 className="text-xl md:text-2xl font-black text-white mt-1.5 font-sans">
                    لقبُك المستحق: {getRankStats(quizState.correctAnswersCount, quizState.questions.length).title}
                  </h2>
                  <p className="text-xs md:text-sm text-emerald-200/95 max-w-md mx-auto mt-1 leading-relaxed">
                    {getRankStats(quizState.correctAnswersCount, quizState.questions.length).text}
                  </p>
                </div>

                {/* Score Stats Grid */}
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 text-center bg-white/5 p-3 rounded-2xl">
                  <div className="p-2 border-l border-b sm:border-b-0 border-white/5">
                    <p className="text-[9px] text-gray-400 uppercase leading-none">النقاط الكلية</p>
                    <p className="text-lg font-black font-mono text-white mt-1 leading-none">{quizState.score}</p>
                    <span className="text-[8.5px] text-emerald-400 block mt-1">{gameMode === "endless" ? "سلسلة بونص" : "مضاعف الاستجابة"}</span>
                  </div>

                  <div className="p-2 border-l border-b sm:border-b-0 border-white/5">
                    <p className="text-[9px] text-gray-400 uppercase leading-none">إجابات صحيحة</p>
                    <p className="text-lg font-black font-mono text-green-400 mt-1 leading-none">{quizState.correctAnswersCount}</p>
                    <span className="text-[8.5px] text-white/50 block mt-1">من {quizState.questions.length}</span>
                  </div>

                  <div className="p-2 border-l border-white/5">
                    <p className="text-[9px] text-gray-400 uppercase leading-none">{gameMode === "endless" ? "الفرص المستهلكة" : "إجابات خاطئة"}</p>
                    <p className="text-lg font-black font-mono text-red-400 mt-1 leading-none">{gameMode === "endless" ? (3 - lives) : quizState.wrongAnswersCount}</p>
                    <span className="text-[8.5px] text-white/50 block mt-1">{gameMode === "endless" ? "من أصل 3 فرص" : "وانقضاء توقيت"}</span>
                  </div>

                  <div className="p-2">
                    <p className="text-[9px] text-gray-400 uppercase leading-none">{gameMode === "endless" ? "أعلى سلسلة أجوبة" : "نسبة الدقة"}</p>
                    <p className="text-lg font-black font-mono text-yellow-300 mt-1 leading-none">
                      {gameMode === "endless" ? highestStreak : Math.round((quizState.correctAnswersCount / quizState.questions.length) * 100) + "%"}
                    </p>
                    <span className="text-[8.5px] text-white/50 block mt-1">{gameMode === "endless" ? "متتالي" : "تقييم الرصيد الشرعي"}</span>
                  </div>
                </div>

                {/* Question Action Reviews Scroller */}
                <div className="text-right space-y-2">
                  <h3 className="text-xs font-black text-yellow-400 border-b border-white/5 pb-1 flex items-center gap-1.5">
                    <span>📖</span>
                    <span>مراجعة الأسئلة وتثبيت الهدي الشرعي:</span>
                  </h3>

                  <div className="max-h-52 overflow-y-auto space-y-2 pr-1 bg-slate-900/40 p-2.5 rounded-xl border border-white/5">
                    {quizState.questions.map((q, idx) => {
                      const ans = quizState.history.find(h => h.questionId === q.id);
                      const correct = ans?.isCorrect || false;

                      return (
                        <div key={idx} className={`p-2.5 rounded-xl border text-[11px] leading-relaxed space-y-1.5 ${correct ? "bg-green-500/5 border-green-500/10 text-slate-100" : "bg-red-500/5 border-red-500/10 text-slate-100"}`}>
                          <div className="flex items-start justify-between gap-1.5">
                            <span className="font-bold">{idx + 1}. {q.text}</span>
                            <span className={`text-[9px] px-1.5 py-0.5 rounded font-black ${correct ? "bg-green-500/15 text-green-300" : "bg-red-500/15 text-red-300"}`}>
                              {correct ? "صحيحة" : "خطأ/تجاوز"}
                            </span>
                          </div>

                          <div className="flex flex-col sm:flex-row gap-1 border-t border-white/5 pt-1.5 text-[10px] text-gray-300 font-sans">
                            <div className="flex-1">
                              <span className="text-gray-400">الإجابة الراجحة:</span> <span className="text-emerald-400 font-bold">{q.options[q.correctAnswerIndex]}</span>
                            </div>
                            {!correct && ans && ans.userAnswerIndex !== null && (
                              <div className="flex-1">
                                <span className="text-gray-300">أجبتَ بـ:</span> <span className="text-red-300 font-semibold">{q.options[ans.userAnswerIndex]}</span>
                              </div>
                            )}
                          </div>

                          <div className="p-1.5 rounded bg-white/2 text-[10px] text-gray-400 font-sans leading-relaxed">
                            {q.explanation}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Big Gorgeous Smartlink Support/Gift Button */}
                <div className="w-full my-4">
                  <a
                    href="https://www.effectivecpmnetwork.com/yag3nryfb5?key=cf9fa40d9007f5546c8691dae19d369b"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="flex items-center justify-center gap-3 w-full py-4 px-6 text-center rounded-2xl font-black text-slate-950 bg-gradient-to-r from-yellow-300 via-amber-400 to-yellow-300 hover:from-yellow-200 hover:via-amber-300 hover:to-yellow-200 transition-all shadow-xl hover:-translate-y-1 hover:shadow-yellow-500/20 active:translate-y-0 text-base md:text-lg border-2 border-yellow-300/60 relative overflow-hidden group cursor-pointer"
                    style={{ animation: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite' }}
                    onClick={() => soundEngine.playTick(true)}
                  >
                    <span className="text-xl md:text-2xl">🎁</span>
                    <span className="tracking-wide font-sans">أظهر هديتك اليومية أو اضغط لدعمنا</span>
                    <span className="text-xl md:text-2xl">🎁</span>
                  </a>
                </div>

                {/* Action controls */}
                <div className="flex flex-col sm:flex-row gap-2.5 pt-1">
                  <button
                    onClick={handleStartQuiz}
                    className="flex-grow py-3 px-5 text-center font-black rounded-xl text-slate-950 bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-300 hover:to-amber-400 active:scale-95 transition-all shadow-md"
                  >
                    محاولة جولة جديدة بأسئلة مفرّقة
                  </button>
                  <button
                    onClick={() => { setIsPlaying(false); setIsComplete(false); }}
                    className="py-3 px-5 border border-white/10 text-gray-300 hover:bg-white/5 rounded-xl text-xs font-semibold"
                  >
                    الرجوع للشاشة وفهرس الأسئلة
                  </button>
                </div>

              </div>
            )}

          </main>

          {/* Clean Arabesque aesthetic footer credit (Anti-AI-slop rule respected) */}
          <footer className="z-10 text-center text-gray-400 text-[10px] md:text-xs py-3 mt-4 border-t border-white/5 max-w-4xl mx-auto w-full select-text leading-relaxed">
            <p className="flex items-center justify-center gap-1.5 font-sans">
              <span>سبحان الله والحمد لله ولا إله إلا الله والله أكبر</span>
              <span className="text-yellow-500/40">•</span>
              <span>مَن سلك طريقاً يلتمس فيه علماً سهّل الله له به طريقاً إلى الجنة</span>
            </p>
          </footer>

          {/* DONATION DIALOG MODAL (POPUP) */}
          {showDonationModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-md animate-fade-in">
              <div className="w-full max-w-md bg-emerald-950/90 border-2 border-yellow-500/30 rounded-3xl p-6 relative overflow-hidden shadow-2xl text-center space-y-5">
                <div className="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-yellow-500 via-amber-400 to-yellow-500" />
                
                {/* Close Button */}
                <button
                  onClick={() => { setShowDonationModal(false); soundEngine.playTick(false); }}
                  className="absolute top-3 right-3 text-emerald-300 hover:text-white bg-white/5 hover:bg-white/10 w-7 h-7 rounded-full flex items-center justify-center text-sm transition-all"
                >
                  ✕
                </button>

                <div className="text-4xl">💖</div>

                <div className="space-y-2 text-right">
                  <h3 className="text-lg font-black text-white text-center">أهلاً بك يا محب الخير والبر لغتنا ولعبتنا! 🌸</h3>
                  <p className="text-xs text-slate-100 font-sans leading-relaxed text-center">
                    دعمك يساعد في الحفاظ على استمرار التطوير والتشغيل وتجهيز الخوادم وإدخال المزيد من الأسئلة المباركة.
                  </p>
                  
                  <div className="p-3.5 bg-emerald-950/40 border border-yellow-500/20 rounded-xl space-y-2 mt-4 text-center">
                    <span className="text-[11px] font-black text-yellow-400 block">طريقة دعمنا ونشر اللعبة للجميع:</span>
                    <a
                      href="https://www.effectivecpmnetwork.com/yag3nryfb5?key=cf9fa40d9007f5546c8691dae19d369b"
                      target="_blank"
                      rel="noopener noreferrer"
                      className="inline-block w-full py-3 px-4 bg-gradient-to-r from-yellow-400 to-amber-500 text-slate-950 font-black rounded-xl text-xs active:scale-95 transition-all shadow hover:from-yellow-300 hover:to-amber-400"
                      onClick={() => { setShowDonationModal(false); soundEngine.playTick(true); }}
                    >
                      🎁 اضغط هنا للتبرع والدعم اليومي عن طريق الهدايا 🎁
                    </a>
                    <span className="text-[9px] text-gray-300 block pt-1 font-sans">
                      *بمجرد فتح الرابط وتصفحه بالكامل، سيتم احتساب عائد دعم حقيقي مالي مجاناً تماماً لفريق عمل وتطوير هذه اللعبة! جزاكم الله كل خير.
                    </span>
                  </div>
                </div>

                <button
                  onClick={() => { setShowDonationModal(false); soundEngine.playTick(false); }}
                  className="w-full py-2 bg-white/5 hover:bg-white/10 text-slate-300 hover:text-white rounded-xl text-xs font-semibold select-none transition-all"
                >
                  إغلاق وتخطي
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    // React render mount initializer
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>

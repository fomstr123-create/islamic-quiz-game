    // --- SOUND SYNTHESIZER ENGINE ---
    let audioCtx = null;
    let isAudioEnabled = true;

    function getAudioContext() {
      if (!isAudioEnabled) return null;
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          audioCtx = new AudioContextClass();
        }
      }
      if (audioCtx && audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      return audioCtx;
    }

    const soundEngine = {
      toggle(enabled) {
        isAudioEnabled = enabled;
        if (!enabled && audioCtx) {
          audioCtx.close().catch(() => {});
          audioCtx = null;
        }
      },
      playTick(isUrgent = false) {
        const ctx = getAudioContext();
        if (!ctx) return;
        try {
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.setValueAtTime(isUrgent ? 880 : 440, now);
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.04, now + 0.005);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.05);
        } catch (e) {
          console.warn(e);
        }
      },
      playCorrect() {
        const ctx = getAudioContext();
        if (!ctx) return;
        try {
          const now = ctx.currentTime;
          const notes = [523.25, 659.25, 783.99, 1046.50];
          notes.forEach((freq, index) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(freq, now + index * 0.08);
            gain.gain.setValueAtTime(0, now + index * 0.08);
            gain.gain.linearRampToValueAtTime(0.12, now + index * 0.08 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.08 + 0.35);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + index * 0.08);
            osc.stop(now + index * 0.08 + 0.4);
          });
        } catch (e) {
          console.warn(e);
        }
      },
      playWrong() {
        const ctx = getAudioContext();
        if (!ctx) return;
        try {
          const now = ctx.currentTime;
          [0, 0.14].forEach((offset) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "triangle";
            osc.frequency.setValueAtTime(115, now + offset);
            osc.frequency.linearRampToValueAtTime(85, now + offset + 0.12);
            gain.gain.setValueAtTime(0, now + offset);
            gain.gain.linearRampToValueAtTime(0.18, now + offset + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.14);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + offset);
            osc.stop(now + offset + 0.15);
          });
        } catch (e) {
          console.warn(e);
        }
      },
      playVictory() {
        const ctx = getAudioContext();
        if (!ctx) return;
        try {
          const now = ctx.currentTime;
          const chords = [
            [261.63, 329.63, 392.00],
            [349.23, 440.00, 523.25],
            [392.00, 493.88, 587.33],
            [523.25, 659.25, 783.99]
          ];
          chords.forEach((chord, chordIdx) => {
            const startTime = now + chordIdx * 0.22;
            const duration = chordIdx === 3 ? 0.8 : 0.2;
            chord.forEach((freq) => {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = chordIdx === 3 ? "sine" : "triangle";
              osc.frequency.setValueAtTime(freq, startTime);
              gain.gain.setValueAtTime(0, startTime);
              gain.gain.linearRampToValueAtTime(0.08, startTime + 0.03);
              gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start(startTime);
              osc.stop(startTime + duration + 0.05);
            });
          });
        } catch (e) {
          console.warn(e);
        }
      }

    function App() {
      const [selectedCategory, setSelectedCategory] = useState("جميع الأسئلة");
      const [isPlaying, setIsPlaying] = useState(false);
      const [isMuted, setIsMuted] = useState(false);
      const [autoAdvance, setAutoAdvance] = useState(true);
      const [gameMode, setGameMode] = useState("classic");
      const [lives, setLives] = useState(3);
      const [streak, setStreak] = useState(0);

      const [highestStreak, setHighestStreak] = useState(() => {
        try {
          const s = localStorage.getItem("stand_islamic_high_streak");
          return s ? parseInt(s, 10) : 0;
        } catch(e) { return 0; }
      });

      const [highScore, setHighScore] = useState(() => {
        try {
          const s = localStorage.getItem("stand_islamic_high_score");
          return s ? parseInt(s, 10) : 0;
        } catch(e) { return 0; }
      });

      const [quizState, setQuizState] = useState({
        currentQuestionIndex: 0,
        score: 0,
        correctAnswersCount: 0,
        wrongAnswersCount: 0,
        selectedAnswerIndex: null,
        isTimeUp: false,
        isAnswered: false,
        timeLeft: 30,
        showExplanation: false,
        questions: [],
        lifelinesUsed: { split: false, skip: false },
        eliminatedOptions: [],
        history: []
      });

      const [advanceCountdown, setAdvanceCountdown] = useState(5);
      const [isComplete, setIsComplete] = useState(false);

      const timerRef = useRef(null);
      const autoAdvanceTimerRef = useRef(null);

      useEffect(() => {
        soundEngine.toggle(!isMuted);
      }, [isMuted]);

      useEffect(() => {
        if (!isPlaying || isComplete) return;
        if (quizState.isAnswered) {
          if (timerRef.current) clearInterval(timerRef.current);
          return;
        }

        timerRef.current = setInterval(() => {
          setQuizState((prev) => {
            if (prev.timeLeft <= 1) {
              clearInterval(timerRef.current);
              soundEngine.playWrong();
              setStreak(0);

              let updatedLives = lives;
              if (gameMode === "endless") {
                updatedLives = Math.max(0, lives - 1);
                setLives(updatedLives);
              }

              return {
                ...prev,
                timeLeft: 0,
                isTimeUp: true,
                isAnswered: true,
                showExplanation: true,
                wrongAnswersCount: prev.wrongAnswersCount + 1,
                history: [
                  ...prev.history,
                  {
                    questionId: prev.questions[prev.currentQuestionIndex].id,
                    userAnswerIndex: null,
                    isCorrect: false
                  }
                ]
              };
            }

            const threshold = gameMode === "rapid" ? 3 : 5;
            if (prev.timeLeft <= threshold) {
              soundEngine.playTick(true);
            } else if (prev.timeLeft % 5 === 0) {
              soundEngine.playTick(false);
            }

            return { ...prev, timeLeft: prev.timeLeft - 1 };
          });
        }, 1000);

        return () => {
          if (timerRef.current) clearInterval(timerRef.current);
        };
      }, [isPlaying, isComplete, quizState.currentQuestionIndex, quizState.isAnswered, gameMode, lives]);

      useEffect(() => {
        if (!isPlaying || !quizState.isAnswered || !autoAdvance || isComplete) {
          if (autoAdvanceTimerRef.current) clearInterval(autoAdvanceTimerRef.current);
          return;
        }

        setAdvanceCountdown(5);

        autoAdvanceTimerRef.current = setInterval(() => {
          setAdvanceCountdown((prev) => {
            if (prev <= 1) {
              clearInterval(autoAdvanceTimerRef.current);
              handleNextQuestion();
              return 5;
            }
            return prev - 1;
          });
        }, 1000);

        return () => {
          if (autoAdvanceTimerRef.current) clearInterval(autoAdvanceTimerRef.current);
        };
      }, [isPlaying, isComplete, quizState.currentQuestionIndex, quizState.isAnswered, autoAdvance]);

      const handleNextQuestion = () => {
        if (timerRef.current) clearInterval(timerRef.current);
        if (autoAdvanceTimerRef.current) clearInterval(autoAdvanceTimerRef.current);

        if (gameMode === "endless" && lives <= 0) {
          endQuizSession();
          return;
        }

        const nextIndex = quizState.currentQuestionIndex + 1;

        if (gameMode === "endless" && nextIndex >= quizState.questions.length) {
          let pool = ALL_QUESTIONS;
          if (selectedCategory !== "جميع الأسئلة") {
            pool = ALL_QUESTIONS.filter(q => q.category === selectedCategory);
          }
          const reshuffled = [...pool].sort(() => Math.random() - 0.5);
          
          setQuizState(prev => ({
            ...prev,
            questions: [...prev.questions, ...reshuffled],
            currentQuestionIndex: nextIndex,
            selectedAnswerIndex: null,
            isTimeUp: false,
            isAnswered: false,
            timeLeft: 15,
            showExplanation: false,
            eliminatedOptions: []
          }));
          return;
        }

        if (nextIndex >= quizState.questions.length) {
          endQuizSession();
        } else {
          const limit = gameMode === "rapid" ? 8 : gameMode === "endless" ? 15 : 30;
          setQuizState(prev => ({
            ...prev,
            currentQuestionIndex: nextIndex,
            selectedAnswerIndex: null,
            isTimeUp: false,
            isAnswered: false,
            timeLeft: limit,
            showExplanation: false,
            eliminatedOptions: []
          }));
        }
      };

      const endQuizSession = () => {
        setIsComplete(true);
        soundEngine.playVictory();
        if (quizState.score > highScore) {
          setHighScore(quizState.score);
          try {
            localStorage.setItem("stand_islamic_high_score", quizState.score.toString());
          } catch(e){}
        }
      };

      const handleStartQuiz = () => {
        let pool = ALL_QUESTIONS;
        if (selectedCategory !== "جميع الأسئلة") {
          pool = ALL_QUESTIONS.filter(q => q.category === selectedCategory);
        }

        const modeTime = gameMode === "rapid" ? 8 : gameMode === "endless" ? 15 : 30;
        setLives(3);
        setStreak(0);

        const shuffled = [...pool].sort(() => Math.random() - 0.5);
        const targetQuestions = gameMode === "endless" ? shuffled : shuffled.slice(0, 10);

        setQuizState({
          currentQuestionIndex: 0,
          score: 0,
          correctAnswersCount: 0,
          wrongAnswersCount: 0,
          selectedAnswerIndex: null,
          isTimeUp: false,
          isAnswered: false,
          timeLeft: modeTime,
          showExplanation: false,
          questions: targetQuestions,
          lifelinesUsed: { split: false, skip: false },
          eliminatedOptions: [],
          history: []
        });

        setIsPlaying(true);
        setIsComplete(false);
        setAdvanceCountdown(5);
      };

      const handleSkipQuestion = () => {
        if (quizState.isAnswered || quizState.lifelinesUsed.skip) return;
        if (timerRef.current) clearInterval(timerRef.current);

        setQuizState(prev => {
          const q = prev.questions[prev.currentQuestionIndex];
          return {
            ...prev,
            isAnswered: true,
            showExplanation: true,
            selectedAnswerIndex: null,
            lifelinesUsed: { ...prev.lifelinesUsed, skip: true },
            history: [
              ...prev.history,
              { questionId: q.id, userAnswerIndex: null, isCorrect: false }
            ]
          };
        });
        soundEngine.playTick(false);
      };

      const handleSplitChoices = () => {
        if (quizState.isAnswered || quizState.lifelinesUsed.split) return;
        const currentQ = quizState.questions[quizState.currentQuestionIndex];
        const correct = currentQ.correctAnswerIndex;
        
        const wrongIndices = currentQ.options
          .map((_, i) => i)
          .filter(i => i !== correct);

        const toEliminate = wrongIndices.sort(() => Math.random() - 0.5).slice(0, 2);

        setQuizState(prev => ({
          ...prev,
          eliminatedOptions: toEliminate,
          lifelinesUsed: { ...prev.lifelinesUsed, split: true }
        }));
        soundEngine.playTick(false);
      };

      const handleSelectAnswer = (optionIdx) => {
        if (quizState.isAnswered) return;
        if (timerRef.current) clearInterval(timerRef.current);

        const currentQ = quizState.questions[quizState.currentQuestionIndex];
        const isCorrect = optionIdx === currentQ.correctAnswerIndex;

        if (isCorrect) {
          soundEngine.playCorrect();
          const nextStreak = streak + 1;
          setStreak(nextStreak);
          if (nextStreak > highestStreak) {
            setHighestStreak(nextStreak);
            try {
              localStorage.setItem("stand_islamic_high_streak", nextStreak.toString());
            } catch(e){}
          }
        } else {
          soundEngine.playWrong();
          setStreak(0);
          if (gameMode === "endless") {
            setLives(l => Math.max(0, l - 1));
          }
        }

        setQuizState((prev) => {
          let scoreAdded = 0;
          if (isCorrect) {
            const basePoints = gameMode === "rapid" ? 150 : 100;
            const multiplier = gameMode === "rapid" ? 10 : gameMode === "endless" ? 5 : 3;
            const streakBonus = gameMode === "endless" ? (streak + 1) * 15 : 0;
            scoreAdded = basePoints + (prev.timeLeft * multiplier) + streakBonus;
          }

          return {
            ...prev,
            selectedAnswerIndex: optionIdx,
            isAnswered: true,
            showExplanation: true,
            score: prev.score + scoreAdded,
            correctAnswersCount: isCorrect ? prev.correctAnswersCount + 1 : prev.correctAnswersCount,
            wrongAnswersCount: !isCorrect ? prev.wrongAnswersCount + 1 : prev.wrongAnswersCount,
            history: [
              ...prev.history,
              { questionId: currentQ.id, userAnswerIndex: optionIdx, isCorrect }
            ]
          };
        });
      };

      const handleQuitQuiz = () => {
        if (confirm("هل أنت متأكد من رغبتك في إنهاء جولة المسابقة الدينية الحالية؟")) {
          setIsPlaying(false);
          setIsComplete(false);
        }
      };

      const getRankStats = (correct, total) => {
        const ratio = total > 0 ? correct / total : 0;
        if (ratio >= 0.95 || (gameMode === "endless" && correct >= 25)) {
          return { title: "العلامة الفذ 👑", text: "ما شاء الله تبارك الله! معرفة فقهية شاملة وثقافة متميزة بالهدى الشريف." };
        }
        if (ratio >= 0.8 || (gameMode === "endless" && correct >= 15)) {
          return { title: "الباحث القدير 🌟", text: "أحسنت جداً! ثقافتك الإسلامية متينة وتملك هدى مميز في قصص وسير الأولين." };
        }
        if (ratio >= 0.5 || (gameMode === "endless" && correct >= 8)) {
          return { title: "المستكشف الذكي 📚", text: "أداء طيب ومبارك. بذلت جهداً نافعاً ومراجعة مستمرة تثبت هذه المعارف المباركة في وجدانك." };
        }
        return { title: "طالب العلم والمثابر 🌱", text: "كل علم يبتدئ بخطوة، الهدف هو ترسيخ هذه المعلومات العظيمة وزيادة الفقه والسرور بالإيمان." };
      };

      const currentQuestion = isPlaying && quizState.questions.length > 0 ? quizState.questions[quizState.currentQuestionIndex] : null;

      return (
        <div className="relative min-h-screen flex flex-col justify-between p-4 sm:p-6 md:p-8 select-none">
          
          {/* Header */}
          <header className="z-10 flex items-center justify-between w-full max-w-4xl mx-auto mb-6 py-4 px-5 glass-panel-light rounded-2xl">
            <div className="flex items-center gap-3">

                </svg>
              </div>
              <div>
                <h1 className="text-lg md:text-xl font-bold text-white flex items-center gap-2">
                  مسابقة <span className="shimmer-text font-extrabold text-yellow-500">الأسئلة الدينية</span>
                </h1>
                <p className="text-[10px] md:text-xs text-emerald-300">نور المعرفة والهدى الثقافي والشرعي</p>
              </div>

            <div className="flex items-center gap-2">
              <button
                onClick={() => setIsMuted(!isMuted)}
                className="p-2.5 rounded-xl border border-white/5 hover:border-yellow-500/30 transition-all hover:bg-white/5 text-gray-200"
                title={isMuted ? "تشغيل رنين الصوتيات" : "كتم الصوت"}
              >
                {isMuted ? (

                    <path strokeLinecap="round" strokeLinejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />

                {/* History Breakdown */}
                <div className="text-right space-y-2">
                  <h3 className="text-xs font-black text-yellow-400 border-b border-white/5 pb-1 flex items-center gap-1.5">
                    <span>📖</span>
                    <span>مراجعة الأسئلة وتثبيت الهدي الشرعي:</span>
                  </h3>

                  <div className="max-h-52 overflow-y-auto space-y-2 pr-1 bg-slate-900/40 p-2.5 rounded-xl border border-white/5" id="questions-history-scroller">
                    {quizState.questions.map((q, idx) => {
                      const ans = quizState.history.find(h => h.questionId === q.id);
                      const correct = ans?.isCorrect || false;

                      return (
                        <div key={idx} className={`p-2.5 rounded-xl border text-[11px] leading-relaxed space-y-1.5 ${correct ? "bg-green-500/5 border-green-500/10 text-slate-100" : "bg-red-500/5 border-red-500/10 text-slate-100"}`}>
                          <div className="flex items-start justify-between gap-1.5">
                            <span className="font-bold">{idx + 1}. {q.text}</span>
                            <span className={`text-[9px] px-1.5 py-0.5 rounded font-black ${correct ? "bg-green-500/15 text-green-300" : "bg-red-500/15 text-red-300"}`}>
                              {correct ? "صحيحة" : "خطأ/تجاوز"}
                            </span>
                          </div>

                          <div className="flex flex-col sm:flex-row gap-1 border-t border-white/5 pt-1.5 text-[10px] text-gray-300 font-sans">
                            <div className="flex-1">
                              <span className="text-gray-400">الإجابة الراجحة:</span> <span className="text-emerald-400 font-bold">{q.options[q.correctAnswerIndex]}</span>
                            </div>
                            {!correct && ans && ans.userAnswerIndex !== null && (
                              <div className="flex-1">
                                <span className="text-gray-300">أجبتَ بـ:</span> <span className="text-red-300 font-semibold">{q.options[ans.userAnswerIndex]}</span>
                              </div>
                            )}
                          </div>

                          <div className="p-1.5 rounded bg-white/2 text-[10px] text-gray-400 font-sans leading-relaxed">
                            {q.explanation}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <SafeBannerComponent />

                <div className="flex flex-col sm:flex-row gap-2.5 pt-1">
                  <button
                    onClick={handleStartQuiz}
                    className="flex-grow py-3 px-5 text-center font-black rounded-xl text-slate-950 bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-300 hover:to-amber-400 active:scale-95 transition-all shadow-md"
                  >
                    محاولة جولة جديدة بأسئلة مفرّقة
                  </button>
                  <button
                    onClick={() => { setIsPlaying(false); setIsComplete(false); }}
                    className="py-3 px-5 border border-white/10 text-gray-300 hover:bg-white/5 rounded-xl text-xs font-semibold"
                  >
                    الرجوع للشاشة وفهرس الأسئلة
                  </button>
                </div>

              </div>
            )}

          </main>

          <footer className="z-10 text-center text-gray-400 text-[10px] md:text-xs py-3 mt-4 border-t border-white/5 max-w-4xl mx-auto w-full select-text leading-relaxed">
            <p className="flex items-center justify-center gap-1.5 font-sans">
              <span>سبحان الله والحمد لله ولا إله إلا الله والله أكبر</span>
              <span className="text-yellow-500/40">•</span>
              <span>مَن سلك طريقاً يلتمس فيه علماً سهّل الله له به طريقاً إلى الجنة</span>
            </p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
